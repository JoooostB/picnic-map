name: Release

on:
  push:
    tags: ["v*"]

# Cancel an in-progress run if the same tag is pushed again.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/joooostb/picnic-map

jobs:
  publish:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # QEMU enables building the linux/arm64 layer on the amd64 runner.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          # v1.2.3 -> :1.2.3, :1.2, :1, :latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=true

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep the published manifest list to just the two real arches.
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
